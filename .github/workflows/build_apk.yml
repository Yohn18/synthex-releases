name: Build Synthex APK

on:
  push:
    paths:
      - 'android_app/**'
      - '.github/workflows/build_apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android_app/**/*.gradle*', 'android_app/**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Install Gradle CLI
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/
          echo "/opt/gradle-8.6/bin" >> $GITHUB_PATH

      - name: Generate Gradle wrapper
        working-directory: android_app
        run: |
          gradle wrapper --gradle-version=8.6
          chmod +x gradlew

      - name: Write local.properties
        working-directory: android_app
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build Release APK
        working-directory: android_app
        run: |
          unset ANDROID_SDK_ROOT
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p dist
          cp android_app/app/build/outputs/apk/release/app-release.apk dist/Synthex.apk
          ls -lh dist/Synthex.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Synthex-APK
          path: dist/Synthex.apk
          retention-days: 90

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Synthex.apk
          name: Synthex Android ${{ github.ref_name }}

      - name: Summary
        run: |
          SIZE=$(du -sh dist/Synthex.apk | cut -f1)
          echo "## ✅ Synthex APK Berhasil Dibuild" >> $GITHUB_STEP_SUMMARY
          echo "| Info | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Ukuran | $SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| Download | Lihat Artifacts di atas |" >> $GITHUB_STEP_SUMMARY
